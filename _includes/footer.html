<footer class="footer">
    <div class="text-center">
        <!--/* This template is released under the Creative Commons Attribution 3.0 License. Please keep the attribution link below when using for your own project. Thank you for your support. :) If you'd like to use the template without the attribution, you can check out other license options via our website: https://themes.3rdwavemedia.com */-->
        {% assign footer = site.data.data.footer %}
        {% if footer %}
        <small class="copyright">
            {% if footer.url and footer.author %}
            {{ footer.text | default: "Designed with" | escape }}
            <i class="fas fa-heart" aria-hidden="true"></i>
            by
            <a href="{{ footer.url | replace_first: 'http://', 'https://' | escape }}" target="_blank" rel="noopener noreferrer nofollow">{{ footer.author | escape }}</a>
            {% else %}
            {{ footer | escape }}
            {% endif %}
        </small>
        {% endif %}
    </div><!--//container-->
</footer><!--//footer-->
